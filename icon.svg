<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a1a08"/>
      <stop offset="100%" stop-color="#0c0804"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="url(#bg)"/>

  <!-- Outer gold border -->
  <rect x="12" y="12" width="488" height="488" rx="62" fill="none"
        stroke="#c9a84c" stroke-width="3" opacity="0.9"/>
  <!-- Inner thin border -->
  <rect x="24" y="24" width="464" height="464" rx="52" fill="none"
        stroke="#c9a84c" stroke-width="1" opacity="0.35"/>

  <!-- Subtle glow overlay -->
  <rect x="12" y="12" width="488" height="488" rx="62" fill="url(#glow)"/>

  <!-- Pentagon mana dots (5 colors of Magic) -->
  <!-- White (top) -->
  <circle cx="256" cy="118" r="26" fill="#f8f0d8" opacity="0.92"/>
  <circle cx="256" cy="118" r="22" fill="#fffce8"/>
  <text x="256" y="126" font-size="22" text-anchor="middle" fill="#8a7040" font-family="serif">☀</text>

  <!-- Blue (upper right) -->
  <circle cx="374" cy="196" r="26" fill="#1a4a8a" opacity="0.92"/>
  <circle cx="374" cy="196" r="22" fill="#2060b0"/>
  <text x="374" y="204" font-size="22" text-anchor="middle" fill="#c0d8f8" font-family="serif">💧</text>

  <!-- Black (lower right) -->
  <circle cx="330" cy="330" r="26" fill="#1a1218" opacity="0.92"/>
  <circle cx="330" cy="330" r="22" fill="#2a1a28"/>
  <text x="330" y="340" font-size="24" text-anchor="middle" fill="#c090d0" font-family="serif">💀</text>

  <!-- Red (lower left) -->
  <circle cx="182" cy="330" r="26" fill="#8a1a0a" opacity="0.92"/>
  <circle cx="182" cy="330" r="22" fill="#c02010"/>
  <text x="182" y="340" font-size="22" text-anchor="middle" fill="#ffd0b0" font-family="serif">🔥</text>

  <!-- Green (upper left) -->
  <circle cx="138" cy="196" r="26" fill="#0a4a18" opacity="0.92"/>
  <circle cx="138" cy="196" r="22" fill="#106828"/>
  <text x="138" y="206" font-size="22" text-anchor="middle" fill="#b0f0c0" font-family="serif">🌿</text>

  <!-- Pentagon lines connecting dots -->
  <polygon points="256,118 374,196 330,330 182,330 138,196"
           fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>

  <!-- Central "M" emblem -->
  <circle cx="256" cy="256" r="46" fill="#1a1008" opacity="0.9"/>
  <circle cx="256" cy="256" r="42" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
  <text x="256" y="272" font-size="48" text-anchor="middle" fill="#e8c96e"
        font-family="Georgia, serif" font-weight="bold" letter-spacing="-2">M</text>

  <!-- Corner ornaments -->
  <path d="M 40 40 L 60 40 L 60 42 L 42 42 L 42 60 L 40 60 Z" fill="#c9a84c" opacity="0.5"/>
  <path d="M 472 40 L 452 40 L 452 42 L 470 42 L 470 60 L 472 60 Z" fill="#c9a84c" opacity="0.5"/>
  <path d="M 40 472 L 60 472 L 60 470 L 42 470 L 42 452 L 40 452 Z" fill="#c9a84c" opacity="0.5"/>
  <path d="M 472 472 L 452 472 L 452 470 L 470 470 L 470 452 L 472 452 Z" fill="#c9a84c" opacity="0.5"/>
</svg>
